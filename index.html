<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport Marketing</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">
    <link href="fonts/intro-rust.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Intro Rust G Base', sans-serif;
            background-color: #2d2f33;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero {
            text-align: center;
            padding: 2rem;
        }

        .brand-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .transport-line {
            display: flex;
            align-items: center;
            gap: 0;
            line-height: 1;
        }

        .transport {
            color: #ffffff;
            font-size: 11rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        .dots {
            display: flex;
            gap: 0.4rem;
            margin-left: 0.3rem;
            align-items: center;
        }

        .dot-link {
            text-decoration: none;
            display: block;
            transition: transform 0.2s ease;
        }

        .dot-link:hover {
            transform: scale(1.1);
        }

        .dot {
            width: 3.2rem;
            height: 3.2rem;
            border-radius: 50%;
            cursor: pointer;
        }

        .dot-blue {
            background-color: #4285f4;
        }

        .dot-red {
            background-color: #ea4335;
        }

        .dot-green {
            background-color: #34a853;
        }

        .marketing {
            color: #ffffff;
            font-size: 3.8rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: -1.5rem;
            margin-right: -2rem;
            align-self: flex-end;
        }

        @media (max-width: 1200px) {
            .transport {
                font-size: 8rem;
            }
            .dot {
                width: 2.5rem;
                height: 2.5rem;
            }
            .marketing {
                font-size: 3rem;
            }
        }

        @media (max-width: 768px) {
            .transport {
                font-size: 5rem;
            }
            .dot {
                width: 1.8rem;
                height: 1.8rem;
            }
            .marketing {
                font-size: 2rem;
                margin-right: -1rem;
            }
        }

        @media (max-width: 480px) {
            .transport {
                font-size: 3rem;
            }
            .dot {
                width: 1.2rem;
                height: 1.2rem;
                gap: 0.2rem;
            }
            .marketing {
                font-size: 1.3rem;
                margin-right: -0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="brand-container">
            <div class="transport-line">
                <h1 class="transport">TRANSPORT</h1>
                <div class="dots">
                    <a href="https://blueline.transportmarketing.net" class="dot-link">
                        <div class="dot dot-blue"></div>
                    </a>
                    <a href="https://redstar.transportmarketing.net" class="dot-link">
                        <div class="dot dot-red"></div>
                    </a>
                    <a href="https://greenpromo.transportmarketing.net" class="dot-link">
                        <div class="dot dot-green"></div>
                    </a>
                </div>
            </div>
            <h2 class="marketing">MARKETING</h2>
        </div>
    </div>
</body>
</html>
