<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenPromo - Transport Marketing</title>
    <link href="../fonts/intro-rust.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Intro Rust G Base', sans-serif;
            background-color: #2d2f33;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero {
            text-align: center;
            padding: 2rem;
        }

        .brand {
            color: #34a853;
            font-size: 8rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .subtitle {
            color: #ffffff;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .dot {
            width: 4rem;
            height: 4rem;
            border-radius: 50%;
            background-color: #34a853;
            margin: 3rem auto;
        }

        .back-link {
            color: #ffffff;
            text-decoration: none;
            font-size: 1rem;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }

        .back-link:hover {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .brand {
                font-size: 4rem;
            }
            .subtitle {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1 class="brand">GREENPROMO</h1>
        <div class="dot"></div>
        <h2 class="subtitle">ECO TRANSPORT</h2>
        <p style="margin-top: 3rem;">
            <a href="https://transportmarketing.net" class="back-link">← Back to Transport Marketing</a>
        </p>
    </div>
</body>
</html>
